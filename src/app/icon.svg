<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0284c7" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="sun" x1="230" y1="330" x2="280" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
  </defs>
  
  <rect width="512" height="512" rx="120" fill="url(#bg)" />
  
  <!-- Calendar Body -->
  <rect x="116" y="160" width="280" height="240" rx="32" fill="#ffffff" />
  
  <!-- Calendar Header -->
  <path d="M 116 192 C 116 174.327 130.327 160 148 160 L 364 160 C 381.673 160 396 174.327 396 192 L 396 232 L 116 232 L 116 192 Z" fill="#0ea5e9" />
  
  <!-- Calendar Bindings / Rings -->
  <rect x="160" y="120" width="24" height="64" rx="12" fill="#f8fafc" />
  <rect x="328" y="120" width="24" height="64" rx="12" fill="#f8fafc" />
  
  <!-- Calendar Grid Lines / Dots -->
  <rect x="156" y="272" width="40" height="40" rx="8" fill="#e0f2fe" />
  <rect x="236" y="272" width="40" height="40" rx="8" fill="#e0f2fe" />
  <rect x="316" y="272" width="40" height="40" rx="8" fill="#e0f2fe" />
  
  <rect x="156" y="336" width="40" height="40" rx="8" fill="#e0f2fe" />
  <rect x="236" y="336" width="40" height="40" rx="8" fill="#0ea5e9" /> <!-- Highlighted Day -->
  <rect x="316" y="336" width="40" height="40" rx="8" fill="#e0f2fe" />
  
  <!-- "Sun" in the highlighted day to signify vacation -->
  <circle cx="256" cy="356" r="10" fill="url(#sun)" />
</svg>
